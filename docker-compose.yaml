version: "3.8"

services:
    db:
        image: pgvector/pgvector:pg15
        container_name: noton_db
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    ollama:
        image: ollama/ollama:latest
        container_name: noton_ollama
        volumes:
            - ollama_data:/root/.ollama
        healthcheck:
            test: ["CMD-SHELL", "ollama list || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    web:
        build:
            context: .
            dockerfile: ./app/Dockerfile
        container_name: noton_web
        command: sh -c "sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
        volumes:
            # Monter le code dans /app/app pour que les imports "from app.xxx" fonctionnent
            - ./app:/app/app
            - ./app/alembic:/app/alembic
            - ./app/alembic.ini:/app/alembic.ini

        ports:
            - "8001:8000"
        environment:
            - APP_NAME=${APP_NAME}
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
            - SECRET_KEY=${SECRET_KEY}
            - OLLAMA_BASE_URL=http://ollama:11434
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - OPENAI_MODEL=${OPENAI_MODEL}
            - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-dall-e-3}
            - MODEL_PRIVATE_PROVIDER=${MODEL_PRIVATE_PROVIDER:-ollama}
            - MODEL_PRIVATE_NAME=${MODEL_PRIVATE_NAME:-llama3.2:1b}
            - MODEL_FAST_PROVIDER=${MODEL_FAST_PROVIDER:-openai}
            - MODEL_FAST_NAME=${MODEL_FAST_NAME:-gpt-5-nano-2025-08-07}
            - MODEL_POWERFUL_PROVIDER=${MODEL_POWERFUL_PROVIDER:-openai}
            - MODEL_POWERFUL_NAME=${MODEL_POWERFUL_NAME:-gpt-5.1-chat-latest}
            # Optimisations CPU pour Docling/EasyOCR
            - DOCLING_CPU_ONLY=${DOCLING_CPU_ONLY:-true}

            - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-}
            - OMP_NUM_THREADS=${OMP_NUM_THREADS:-}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
        depends_on:
            db:
                condition: service_healthy
            ollama:
                condition: service_healthy

volumes:
    postgres_data:
    ollama_data:
