version: "3.8"

services:
    db:
        image: pgvector/pgvector:pg15
        container_name: noton_db
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "5435:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5


    web:
        build:
            context: .
            dockerfile: ./app/Dockerfile
        container_name: noton_web
        command: sh -c "sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
        volumes:
            # Monter le code dans /app/app pour que les imports "from app.xxx" fonctionnent
            - ./app:/app/app
            - ./app/alembic:/app/alembic
            - ./app/alembic.ini:/app/alembic.ini
            # Cache persistant pour les modèles ML (évite re-téléchargement à chaque rebuild)
            - models_cache:/root/.cache
            # Images extraites par Docling (multimodal) - montées localement pour accès externe
            - ./media:/app/media

        ports:
            - "8001:8000"
        environment:
            - APP_NAME=${APP_NAME}
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
            - SECRET_KEY=${SECRET_KEY}
            - MISTRAL_API_KEY=${MISTRAL_API_KEY}
            - MISTRAL_BASE_URL=${MISTRAL_BASE_URL:-https://api.mistral.ai}
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - OPENAI_MODEL=${OPENAI_MODEL}
            - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
            - MODEL_FAST=${MODEL_FAST:-mistral-small-latest}
            # Optimisations CPU pour Docling/EasyOCR
            - DOCLING_CPU_ONLY=${DOCLING_CPU_ONLY:-true}
            - DOCLING_OCR_ENABLED=${DOCLING_OCR_ENABLED:-true}
            - DOCLING_OCR_LANG=${DOCLING_OCR_LANG:-}
            - USE_ALL_CPU_CORES=${USE_ALL_CPU_CORES:-true}
            - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-}
            - OMP_NUM_THREADS=${OMP_NUM_THREADS:-}
            # Paramètres OCR avancés
            - OCR_IMAGE_SCALE=${OCR_IMAGE_SCALE:-3.0}
            - OCR_PREPROCESS_ENABLED=${OCR_PREPROCESS_ENABLED:-true}
            - OCR_FALLBACK_ENABLED=${OCR_FALLBACK_ENABLED:-true}
            - OCR_MIN_TEXT_LENGTH=${OCR_MIN_TEXT_LENGTH:-50}
            - OCR_TESSERACT_CONFIG=${OCR_TESSERACT_CONFIG:---oem 3 --psm 6 -l fra+eng}
            - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-16}
            - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
            - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
            - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
            - HIERARCHICAL_CHUNK_SIZES=${HIERARCHICAL_CHUNK_SIZES:-3072,1024,384}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
            # KAG - Knowledge Augmented Generation
            - RAG_TOP_K=${RAG_TOP_K}
            - KAG_ENABLED=${KAG_ENABLED:-true}
            - KAG_EXTRACTION_PROVIDER=${KAG_EXTRACTION_PROVIDER}
            - KAG_EXTRACTION_MODEL=${KAG_EXTRACTION_MODEL}
            - KAG_PARENT_ENRICHMENT_ENABLED=${KAG_PARENT_ENRICHMENT_ENABLED:-true}
            - MULTIMODAL_ENABLED=${MULTIMODAL_ENABLED:-true}
            - VISION_MODEL=${VISION_MODEL:-gpt-4o}
        depends_on:
            db:
                condition: service_healthy

volumes:
    postgres_data:
    models_cache:  # Cache persistant pour HuggingFace, EasyOCR, Docling
    media_data:    # Images extraites par Docling (multimodal)
