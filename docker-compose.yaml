version: "3.8"

services:
    db:
        image: pgvector/pgvector:pg15
        container_name: noton_db
        environment:
            POSTGRES_DB: noton
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    ollama:
        image: ollama/ollama:latest
        container_name: noton_ollama
        volumes:
            - ollama_data:/root/.ollama
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
            interval: 10s
            timeout: 5s
            retries: 5

    web:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: noton_web
        command: sh -c "sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
        volumes:
            - ./:/app
            - ./alembic.ini:/app/alembic.ini
        ports:
            - "8001:8000"
        environment:
            - DATABASE_URL=postgresql://postgres:postgres@db:5432/noton
            - SECRET_KEY=your-secret-key-change-in-production
            - OLLAMA_BASE_URL=http://ollama:11434
        depends_on:
            db:
                condition: service_healthy
            ollama:
                condition: service_healthy

volumes:
    postgres_data:
    ollama_data:
