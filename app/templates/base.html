<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Noton{% endblock %}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
        />
        <style>
            [x-cloak] {
                display: none !important;
            }
        </style>
        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-gray-50">
        <div class="flex h-screen">
            <!-- Sidebar -->
            <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
                <div class="p-4 border-b border-gray-200">
                    <h1 class="text-xl font-bold text-gray-900">Noton</h1>
                </div>
                <nav class="flex-1 p-4">
                    <a
                        href="/"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-700"
                    >
                        <i class="ti ti-folder"></i>
                        <span>Tous les projets</span>
                    </a>
                    <div class="mt-6">
                        <div
                            class="flex items-center justify-between px-3 py-2"
                        >
                            <span
                                class="text-xs font-semibold text-gray-500 uppercase"
                                >PROJETS</span
                            >
                            <button
                                onclick="showCreateProjectModal()"
                                class="text-gray-400 hover:text-gray-600"
                            >
                                <i class="ti ti-plus"></i>
                            </button>
                        </div>
                        <div id="projects-list" class="mt-2">
                            <!-- Projets chargés dynamiquement -->
                        </div>
                    </div>
                </nav>
                <div class="p-4 border-t border-gray-200">
                    <div class="flex items-center justify-between">
                        <span
                            id="current-user"
                            class="text-sm text-gray-700"
                        ></span>
                        <button
                            onclick="logout()"
                            class="text-gray-400 hover:text-gray-600"
                        >
                            <i class="ti ti-logout"></i>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col overflow-hidden">
                {% block content %}{% endblock %}
            </main>
        </div>

        <!-- Modals -->
        <div
            id="create-project-modal"
            class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
        >
            <div class="bg-white rounded-lg p-6 w-full max-w-md">
                <h2 class="text-xl font-bold mb-4">Créer un nouveau projet</h2>
                <form id="create-project-form" onsubmit="createProject(event)">
                    <div class="mb-4">
                        <label
                            class="block text-sm font-medium text-gray-700 mb-2"
                            >Titre</label
                        >
                        <input
                            type="text"
                            name="title"
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Mon projet"
                        />
                    </div>
                    <div class="mb-4">
                        <label
                            class="block text-sm font-medium text-gray-700 mb-2"
                            >Description (optionnelle)</label
                        >
                        <textarea
                            name="description"
                            rows="3"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Décrivez votre projet..."
                        ></textarea>
                    </div>
                    <div class="flex justify-end gap-2">
                        <button
                            type="button"
                            onclick="hideCreateProjectModal()"
                            class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
                        >
                            Annuler
                        </button>
                        <button
                            type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                        >
                            Créer le projet
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            // Token JWT stocké dans localStorage
            let authToken = localStorage.getItem("authToken");
            let currentUser = null;

            // Fonctions utilitaires
            async function apiCall(url, options = {}) {
                // Récupérer le token à chaque appel depuis localStorage
                const token = localStorage.getItem("authToken");
                const headers = {
                    "Content-Type": "application/json",
                    ...options.headers,
                };
                if (token) {
                    headers["Authorization"] = `Bearer ${token}`;
                } else {
                    console.warn("No auth token found for request to:", url);
                }
                const response = await fetch(url, {
                    ...options,
                    headers,
                });
                if (response.status === 401) {
                    console.error("401 Unauthorized for:", url);
                    localStorage.removeItem("authToken");
                    authToken = null;
                    window.location.href = "/login";
                    return null;
                }
                return response;
            }

            function showCreateProjectModal() {
                document
                    .getElementById("create-project-modal")
                    .classList.remove("hidden");
            }

            function hideCreateProjectModal() {
                document
                    .getElementById("create-project-modal")
                    .classList.add("hidden");
                document.getElementById("create-project-form").reset();
            }

            async function createProject(event) {
                event.preventDefault();
                const formData = new FormData(event.target);
                const data = {
                    title: formData.get("title"),
                    description: formData.get("description") || null,
                };
                const response = await apiCall("/api/projects", {
                    method: "POST",
                    body: JSON.stringify(data),
                });
                if (response && response.ok) {
                    hideCreateProjectModal();
                    loadProjects();
                    if (window.loadProjectsList) window.loadProjectsList();
                }
            }

            async function loadProjects() {
                const response = await apiCall("/api/projects");
                if (response && response.ok) {
                    const projects = await response.json();
                    const projectsList =
                        document.getElementById("projects-list");
                    if (projectsList) {
                        projectsList.innerHTML = projects
                            .map(
                                (p) => `
                        <a href="/projects/${p.id}" class="block px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-700">
                            ${p.title}
                        </a>
                    `
                            )
                            .join("");
                    }
                }
            }

            async function logout() {
                localStorage.removeItem("authToken");
                window.location.href = "/login";
            }

            async function loadCurrentUser() {
                const response = await apiCall("/api/auth/me");
                if (response && response.ok) {
                    currentUser = await response.json();
                    const userElement = document.getElementById("current-user");
                    if (userElement) {
                        userElement.textContent = currentUser.username;
                    }
                } else {
                    window.location.href = "/login";
                }
            }

            // Initialisation
            // Mettre à jour authToken depuis localStorage
            authToken = localStorage.getItem("authToken");
            if (authToken) {
                loadCurrentUser();
                loadProjects();
            } else if (
                !window.location.pathname.includes("/login") &&
                !window.location.pathname.includes("/register")
            ) {
                window.location.href = "/login";
            }
        </script>
        {% block extra_scripts %}{% endblock %}
    </body>
</html>
