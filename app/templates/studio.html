{% extends "base.html" %}
{% block title %}Studio - {{ app_name }}{% endblock %}
{% block extra_head %}
<!-- Marked.js pour le rendu Markdown des résultats -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    .tab-button {
        padding: 0.75rem 1.5rem;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
    }
    .tab-button.active {
        border-bottom-color: #3b82f6;
        color: #3b82f6;
    }
    .tab-button:hover {
        background-color: rgba(59, 130, 246, 0.1);
    }
    .dark .tab-button.active {
        border-bottom-color: #60a5fa;
        color: #60a5fa;
    }
    .tab-content {
        display: none;
    }
    .tab-content.active {
        display: block;
    }
</style>
{% endblock %}
{% block content %}
<div class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0">
        <h1 class="text-lg sm:text-xl font-semibold text-gray-900 dark:text-gray-100">
            Studio d'Agents
        </h1>
    </header>

    <!-- Tabs -->
    <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
        <div class="px-4 sm:px-6 flex gap-4">
            <button class="tab-button active" onclick="switchTab('agents')">
                <i class="ti ti-robot"></i>
                <span class="ml-2">Agents</span>
            </button>
            <button class="tab-button" onclick="switchTab('scheduler')">
                <i class="ti ti-clock"></i>
                <span class="ml-2">Scheduler</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-gray-50 dark:bg-gray-900">
        <!-- Onglet Agents -->
        <div id="agents-tab" class="tab-content active">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Mes Agents</h2>
                    <button onclick="showCreateAgentModal()" class="px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 flex items-center gap-2">
                        <i class="ti ti-plus"></i>
                        <span>Créer un agent</span>
                    </button>
                </div>
                
                <div id="agents-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Agents chargés dynamiquement -->
                </div>
            </div>
        </div>

        <!-- Onglet Scheduler -->
        <div id="scheduler-tab" class="tab-content">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Jobs Planifiés</h2>
                    <button onclick="showCreateJobModal()" class="px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 flex items-center gap-2">
                        <i class="ti ti-plus"></i>
                        <span>Créer un job</span>
                    </button>
                </div>
                <div id="jobs-list" class="space-y-4">
                    <!-- Jobs chargés dynamiquement -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Création/Édition Agent -->
<div id="agent-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <h2 id="agent-modal-title" class="text-xl font-bold mb-4 text-gray-900 dark:text-gray-100">Créer un agent</h2>
        <form id="agent-form" onsubmit="saveAgent(event)">
            <input type="hidden" id="agent-id" name="agent_id">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nom de l'agent</label>
                <input type="text" id="agent-name" name="name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Assistant Résumeur">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Personnalité (System Prompt)</label>
                <textarea id="agent-personality" name="personality" required rows="6" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Tu es un assistant IA qui..."></textarea>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Modèle par défaut</label>
                <select id="agent-model-preset" name="model_preset" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Utiliser le modèle du chat</option>
                    <option value="private">🔒 Privé</option>
                    <option value="fast">⚡ Rapide</option>
                    <option value="powerful">💪 Puissant</option>
                </select>
            </div>
            
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Tâches</label>
                    <button type="button" onclick="addTaskField()" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">
                        <i class="ti ti-plus"></i> Ajouter une tâche
                    </button>
                </div>
                <div id="tasks-container" class="space-y-3">
                    <!-- Tâches ajoutées dynamiquement -->
                </div>
            </div>
            
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="hideAgentModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">
                    Annuler
                </button>
                <button type="submit" class="px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Création/Édition Job -->
<div id="job-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-xl max-h-[90vh] overflow-y-auto">
        <h2 id="job-modal-title" class="text-xl font-bold mb-4 text-gray-900 dark:text-gray-100">Créer un job planifié</h2>
        <form id="job-form" onsubmit="saveJob(event)">
            <input type="hidden" id="job-id" name="job_id">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Agent</label>
                <select id="job-agent" name="agent_id" required onchange="loadAgentTasksForJob()" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Sélectionner un agent</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tâches à exécuter</label>
                <div id="job-tasks-container" class="space-y-2">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Sélectionnez d'abord un agent</p>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Horaire</label>
                <div class="flex gap-4">
                    <div>
                        <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Heure</label>
                        <select id="job-hour" name="schedule_hour" required class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Minute</label>
                        <select id="job-minute" name="schedule_minute" required class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Jours</label>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="0" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Lun</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="1" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Mar</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="2" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Mer</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="3" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Jeu</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="4" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Ven</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="5" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Sam</span>
                    </label>
                    <label class="flex items-center gap-2 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                        <input type="checkbox" name="schedule_days" value="6" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Dim</span>
                    </label>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="job-enabled" name="enabled" checked class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Activé</span>
                </label>
            </div>
            
            <div class="flex justify-end gap-2 mt-6">
                <button type="button" onclick="hideJobModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">
                    Annuler
                </button>
                <button type="submit" class="px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    let agents = [];
    let jobs = [];
    let currentAgentTasks = [];

    // Changer d'onglet
    function switchTab(tabName) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        event.target.closest('.tab-button').classList.add('active');
        document.getElementById(`${tabName}-tab`).classList.add('active');
        
        if (tabName === 'agents') {
            loadAgents();
        } else if (tabName === 'scheduler') {
            loadJobs();
        }
    }

    // ========== AGENTS ==========

    async function loadAgents() {
        const response = await apiCall('/api/agents');
        if (response && response.ok) {
            agents = await response.json();
            renderAgents();
        }
    }

    function renderAgents() {
        const container = document.getElementById('agents-list');
        if (agents.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-500 dark:text-gray-400 py-8">Aucun agent créé. Créez votre premier agent !</div>';
            return;
        }
        
        container.innerHTML = agents.map(agent => `
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-lg transition-shadow">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">${escapeHtml(agent.name)}</h3>
                    <div class="flex gap-2">
                        <button onclick="editAgent(${agent.id})" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300" title="Modifier">
                            <i class="ti ti-pencil"></i>
                        </button>
                        <button onclick="deleteAgent(${agent.id})" class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300" title="Supprimer">
                            <i class="ti ti-trash"></i>
                        </button>
                    </div>
                </div>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-3">${escapeHtml(agent.personality.substring(0, 150))}${agent.personality.length > 150 ? '...' : ''}</p>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-gray-500 dark:text-gray-400">
                        <i class="ti ti-list-check"></i> ${agent.task_count} tâche(s)
                    </span>
                    ${agent.model_preset ? `<span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${getPresetLabel(agent.model_preset)}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    function getPresetLabel(preset) {
        const labels = {
            'private': '🔒 Privé',
            'fast': '⚡ Rapide',
            'powerful': '💪 Puissant'
        };
        return labels[preset] || preset;
    }

    function showCreateAgentModal() {
        document.getElementById('agent-modal-title').textContent = 'Créer un agent';
        document.getElementById('agent-form').reset();
        document.getElementById('agent-id').value = '';
        document.getElementById('tasks-container').innerHTML = '';
        document.getElementById('agent-modal').classList.remove('hidden');
    }

    function hideAgentModal() {
        document.getElementById('agent-modal').classList.add('hidden');
    }

    async function editAgent(agentId) {
        const agent = agents.find(a => a.id === agentId);
        if (!agent) return;
        
        // Charger les tâches de l'agent
        const response = await apiCall(`/api/agents/${agentId}/tasks`);
        if (response && response.ok) {
            const tasks = await response.json();
            
            document.getElementById('agent-modal-title').textContent = 'Modifier l\'agent';
            document.getElementById('agent-id').value = agent.id;
            document.getElementById('agent-name').value = agent.name;
            document.getElementById('agent-personality').value = agent.personality;
            document.getElementById('agent-model-preset').value = agent.model_preset || '';
            
            const tasksContainer = document.getElementById('tasks-container');
            tasksContainer.innerHTML = '';
            tasks.forEach(task => {
                addTaskField(task);
            });
            
            document.getElementById('agent-modal').classList.remove('hidden');
        }
    }

    function addTaskField(task = null) {
        const container = document.getElementById('tasks-container');
        const taskId = task ? task.id : Date.now();
        const div = document.createElement('div');
        div.className = 'border border-gray-300 dark:border-gray-600 rounded-lg p-3';
        div.innerHTML = `
            <input type="hidden" name="task_id[]" value="${task ? task.id : ''}">
            <div class="flex justify-between items-start mb-2">
                <input type="text" name="task_name[]" value="${task ? escapeHtml(task.name) : ''}" required placeholder="Nom de la tâche" class="flex-1 px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                <button type="button" onclick="this.closest('div').parentElement.remove()" class="ml-2 text-red-600 dark:text-red-400 hover:text-red-800">
                    <i class="ti ti-x"></i>
                </button>
            </div>
            <textarea name="task_instruction[]" required rows="2" placeholder="Instruction / Prompt de la tâche" class="w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">${task ? escapeHtml(task.instruction) : ''}</textarea>
        `;
        container.appendChild(div);
    }

    async function saveAgent(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const agentId = formData.get('agent_id');
        
        const agentData = {
            name: formData.get('name'),
            personality: formData.get('personality'),
            model_preset: formData.get('model_preset') || null
        };
        
        // Créer ou mettre à jour l'agent
        const url = agentId ? `/api/agents/${agentId}` : '/api/agents';
        const method = agentId ? 'PUT' : 'POST';
        
        const response = await apiCall(url, {
            method: method,
            body: JSON.stringify(agentData)
        });
        
        if (response && response.ok) {
            const agent = await response.json();
            
            // Gérer les tâches
            const taskNames = formData.getAll('task_name[]');
            const taskInstructions = formData.getAll('task_instruction[]');
            const taskIds = formData.getAll('task_id[]');
            
            // Charger les tâches existantes si édition
            let existingTasks = [];
            if (agentId) {
                const tasksResponse = await apiCall(`/api/agents/${agent.id}/tasks`);
                if (tasksResponse && tasksResponse.ok) {
                    existingTasks = await tasksResponse.json();
                }
            }
            
            // Supprimer les tâches qui ne sont plus présentes
            for (const existingTask of existingTasks) {
                if (!taskIds.includes(String(existingTask.id))) {
                    await apiCall(`/api/agents/${agent.id}/tasks/${existingTask.id}`, { method: 'DELETE' });
                }
            }
            
            // Créer ou mettre à jour les tâches
            for (let i = 0; i < taskNames.length; i++) {
                const taskData = {
                    name: taskNames[i],
                    instruction: taskInstructions[i]
                };
                
                const taskId = taskIds[i];
                if (taskId) {
                    // Mise à jour
                    await apiCall(`/api/agents/${agent.id}/tasks/${taskId}`, {
                        method: 'PUT',
                        body: JSON.stringify(taskData)
                    });
                } else {
                    // Création
                    await apiCall(`/api/agents/${agent.id}/tasks`, {
                        method: 'POST',
                        body: JSON.stringify(taskData)
                    });
                }
            }
            
            hideAgentModal();
            loadAgents();
        }
    }

    async function deleteAgent(agentId) {
        if (!confirm('Êtes-vous sûr de vouloir supprimer cet agent ?')) return;
        
        const response = await apiCall(`/api/agents/${agentId}`, { method: 'DELETE' });
        if (response && response.ok) {
            loadAgents();
        }
    }

    // ========== SCHEDULER ==========

    async function loadJobs() {
        const response = await apiCall('/api/scheduler/jobs');
        if (response && response.ok) {
            jobs = await response.json();
            renderJobs();
        }
    }

    function formatSchedule(job) {
        const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
        const days = job.schedule_days.map(d => dayNames[d]).join(', ');
        const hour = String(job.schedule_hour).padStart(2, '0');
        const minute = String(job.schedule_minute).padStart(2, '0');
        return `${days} à ${hour}h${minute}`;
    }

    function renderJobs() {
        const container = document.getElementById('jobs-list');
        if (jobs.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8">Aucun job planifié. Créez votre premier job !</div>';
            return;
        }
        
        container.innerHTML = jobs.map(job => `
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2">
                            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">${escapeHtml(job.agent_name || 'Agent inconnu')}</h3>
                            <span class="px-2 py-1 rounded text-xs ${job.enabled ? 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'}">
                                ${job.enabled ? 'Actif' : 'Inactif'}
                            </span>
                        </div>
                        <div class="text-sm text-gray-600 dark:text-gray-400 space-y-1">
                            <div><i class="ti ti-clock"></i> ${formatSchedule(job)}</div>
                            <div><i class="ti ti-list"></i> ${job.task_ids.length} tâche(s) à exécuter</div>
                            ${job.last_run_at ? `<div><i class="ti ti-history"></i> Dernière exécution: ${new Date(job.last_run_at).toLocaleString('fr-FR')}</div>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="runJobNow(${job.id})" class="text-green-600 dark:text-green-400 hover:text-green-800 dark:hover:text-green-300" title="Lancer maintenant">
                            <i class="ti ti-player-play"></i>
                        </button>
                        <button onclick="viewJobResults(${job.id})" class="text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-300" title="Voir les résultats">
                            <i class="ti ti-file-text"></i>
                        </button>
                        <button onclick="editJob(${job.id})" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300" title="Modifier">
                            <i class="ti ti-pencil"></i>
                        </button>
                        <button onclick="deleteJob(${job.id})" class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300" title="Supprimer">
                            <i class="ti ti-trash"></i>
                        </button>
                    </div>
                </div>
                <div id="job-results-${job.id}" class="hidden mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                    <!-- Résultats chargés dynamiquement -->
                </div>
            </div>
        `).join('');
    }

    async function showCreateJobModal() {
        document.getElementById('job-modal-title').textContent = 'Créer un job planifié';
        document.getElementById('job-form').reset();
        document.getElementById('job-id').value = '';
        document.getElementById('job-enabled').checked = true;
        
        // Initialiser les selects heure/minute si pas encore fait
        initTimeSelects();
        
        // Charger les agents pour le sélecteur
        if (agents.length === 0) {
            await loadAgents();
        }
        
        const select = document.getElementById('job-agent');
        select.innerHTML = '<option value="">Sélectionner un agent</option>' + 
            agents.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('');
        
        document.getElementById('job-tasks-container').innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Sélectionnez d\'abord un agent</p>';
        
        document.getElementById('job-modal').classList.remove('hidden');
    }
    
    function initTimeSelects() {
        const hourSelect = document.getElementById('job-hour');
        const minuteSelect = document.getElementById('job-minute');
        
        if (hourSelect) {
            hourSelect.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = String(i).padStart(2, '0') + 'h';
                hourSelect.appendChild(option);
            }
        }
        
        if (minuteSelect) {
            minuteSelect.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = String(i).padStart(2, '0');
                minuteSelect.appendChild(option);
            }
        }
    }

    function hideJobModal() {
        document.getElementById('job-modal').classList.add('hidden');
    }

    async function loadAgentTasksForJob() {
        const agentId = document.getElementById('job-agent').value;
        const container = document.getElementById('job-tasks-container');
        
        if (!agentId) {
            container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Sélectionnez d\'abord un agent</p>';
            return;
        }
        
        const response = await apiCall(`/api/agents/${agentId}/tasks`);
        if (response && response.ok) {
            const tasks = await response.json();
            
            if (tasks.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Cet agent n\'a pas de tâches. Ajoutez-en dans l\'onglet Agents.</p>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <label class="flex items-start gap-2 p-2 border border-gray-200 dark:border-gray-700 rounded hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer">
                    <input type="checkbox" name="task_ids[]" value="${task.id}" class="mt-1 rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                    <div class="flex-1">
                        <div class="font-medium text-sm text-gray-900 dark:text-gray-100">${escapeHtml(task.name)}</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400">${escapeHtml(task.instruction.substring(0, 100))}${task.instruction.length > 100 ? '...' : ''}</div>
                    </div>
                </label>
            `).join('');
        }
    }

    async function editJob(jobId) {
        const job = jobs.find(j => j.id === jobId);
        if (!job) return;
        
        document.getElementById('job-modal-title').textContent = 'Modifier le job planifié';
        document.getElementById('job-id').value = job.id;
        document.getElementById('job-agent').value = job.agent_id;
        document.getElementById('job-hour').value = job.schedule_hour;
        document.getElementById('job-minute').value = job.schedule_minute;
        document.getElementById('job-enabled').checked = job.enabled;
        
        // Charger les tâches de l'agent
        await loadAgentTasksForJob();
        
        // Cocher les tâches sélectionnées
        job.task_ids.forEach(taskId => {
            const checkbox = document.querySelector(`input[name="task_ids[]"][value="${taskId}"]`);
            if (checkbox) checkbox.checked = true;
        });
        
        // Cocher les jours sélectionnés
        document.querySelectorAll('input[name="schedule_days"]').forEach(checkbox => {
            checkbox.checked = job.schedule_days.includes(parseInt(checkbox.value));
        });
        
        initTimeSelects();
        document.getElementById('job-hour').value = job.schedule_hour;
        document.getElementById('job-minute').value = job.schedule_minute;
        document.getElementById('job-modal').classList.remove('hidden');
    }

    async function saveJob(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const jobId = formData.get('job_id');
        
        const taskIds = formData.getAll('task_ids[]').map(id => parseInt(id));
        const scheduleDays = formData.getAll('schedule_days').map(d => parseInt(d));
        
        if (taskIds.length === 0) {
            alert('Veuillez sélectionner au moins une tâche');
            return;
        }
        
        if (scheduleDays.length === 0) {
            alert('Veuillez sélectionner au moins un jour');
            return;
        }
        
        const jobData = {
            agent_id: parseInt(formData.get('agent_id')),
            task_ids: taskIds,
            schedule_hour: parseInt(formData.get('schedule_hour')),
            schedule_minute: parseInt(formData.get('schedule_minute')),
            schedule_days: scheduleDays,
            enabled: formData.get('enabled') === 'on'
        };
        
        const url = jobId ? `/api/scheduler/jobs/${jobId}` : '/api/scheduler/jobs';
        const method = jobId ? 'PUT' : 'POST';
        
        const response = await apiCall(url, {
            method: method,
            body: JSON.stringify(jobData)
        });
        
        if (response && response.ok) {
            hideJobModal();
            loadJobs();
        }
    }

    async function runJobNow(jobId) {
        const response = await apiCall(`/api/scheduler/jobs/${jobId}/run`, { method: 'POST' });
        if (response && response.ok) {
            const data = await response.json();
            if (data.ok) {
                setTimeout(loadJobs, 2000);
            }
        }
    }

    async function deleteJob(jobId) {
        if (!confirm('Êtes-vous sûr de vouloir supprimer ce job planifié ?')) return;
        
        const response = await apiCall(`/api/scheduler/jobs/${jobId}`, { method: 'DELETE' });
        if (response && response.ok) {
            loadJobs();
        }
    }

    async function viewJobResults(jobId) {
        const resultsDiv = document.getElementById(`job-results-${jobId}`);
        
        // Toggle affichage
        if (!resultsDiv.classList.contains('hidden')) {
            resultsDiv.classList.add('hidden');
            return;
        }
        
        // Charger les résultats
        const response = await apiCall(`/api/scheduler/jobs/${jobId}/runs`);
        if (response && response.ok) {
            const runs = await response.json();
            
            if (runs.length === 0) {
                resultsDiv.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Aucun résultat d\'exécution pour le moment.</p>';
            } else {
                // Grouper par run_at (même exécution = même timestamp)
                const groupedRuns = {};
                runs.forEach(run => {
                    const key = run.run_at;
                    if (!groupedRuns[key]) {
                        groupedRuns[key] = [];
                    }
                    groupedRuns[key].push(run);
                });
                
                resultsDiv.innerHTML = Object.entries(groupedRuns).map(([runAt, runTasks]) => `
                    <div class="mb-4 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                        <div class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            <i class="ti ti-calendar"></i> ${new Date(runAt).toLocaleString('fr-FR')}
                        </div>
                        ${runTasks.map(run => `
                            <div class="mt-2 p-2 bg-white dark:bg-gray-800 rounded border border-gray-200 dark:border-gray-700">
                                <div class="text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">
                                    <i class="ti ti-subtask"></i> ${escapeHtml(run.task_name)}
                                </div>
                                ${run.error ? `
                                    <div class="text-sm text-red-600 dark:text-red-400">
                                        <i class="ti ti-alert-circle"></i> Erreur: ${escapeHtml(run.error)}
                                    </div>
                                ` : (run.output != null && run.output !== '') ? `
                                    <div class="text-sm text-gray-700 dark:text-gray-300 mt-2">
                                        <details open>
                                            <summary class="cursor-pointer hover:text-blue-600 dark:hover:text-blue-400">▼ Voir le résultat</summary>
                                            <div class="mt-2 p-3 bg-gray-100 dark:bg-gray-900 rounded max-h-[70vh] overflow-y-auto markdown-content">
                                                ${marked.parse(run.output)}
                                            </div>
                                        </details>
                                    </div>
                                ` : '<div class="text-sm text-gray-500 dark:text-gray-400">Réponse vide du modèle</div>'}
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            }
            
            resultsDiv.classList.remove('hidden');
        }
    }

    // Initialisation
    loadAgents();
</script>
{% endblock %}
