{% extends "base.html" %}

{% block title %}Projet - Noton{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-600 hover:text-gray-900">
                <i class="ti ti-arrow-left"></i>
            </a>
            <h1 id="project-title" class="text-xl font-semibold text-gray-900">Chargement...</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="showCreateNoteModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2">
                <i class="ti ti-plus"></i>
                <span>Nouvelle note</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 flex overflow-hidden min-h-0">
        <!-- Notes List -->
        <div id="notes-list-container" class="w-full bg-white border-r-0 overflow-y-auto transition-all duration-300 min-h-0">
            <div class="p-6">
                <div id="notes-container">
                    <!-- Notes chargées dynamiquement -->
                </div>
            </div>
        </div>

        <!-- Chatbot Area -->
        <div id="project-chatbot-area" class="hidden flex-1 flex flex-col bg-white transition-all duration-300 min-h-0">
            <div class="p-6 border-b border-gray-200 flex items-center justify-between flex-shrink-0">
                <div>
                    <h2 class="text-lg font-semibold text-gray-900">Assistant IA du projet</h2>
                    <p class="text-sm text-gray-500 mt-1">Posez des questions sur vos notes</p>
                </div>
                <button onclick="toggleProjectChatbot()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="ti ti-x text-xl"></i>
                </button>
            </div>
            
            <!-- Model Selection -->
            <div class="px-6 py-4 border-b border-gray-200 flex-shrink-0">
                <label class="block text-sm font-medium text-gray-700 mb-2">Modèle</label>
                <select id="project-model-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Chargement des modèles...</option>
                </select>
            </div>

            <!-- Chat Messages -->
            <div id="project-chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 min-h-0">
                <div class="text-center text-gray-500 py-8">
                    <i class="ti ti-message-circle text-4xl mb-2"></i>
                    <p>Posez des questions sur vos notes</p>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="p-6 border-t border-gray-200 flex-shrink-0">
                <form id="project-chat-form" onsubmit="sendProjectChatMessage(event)" class="flex gap-2">
                    <input 
                        type="text" 
                        id="project-chat-input" 
                        placeholder="Tapez votre message..." 
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                    <button 
                        type="submit" 
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2"
                    >
                        <i class="ti ti-send"></i>
                        <span>Envoyer</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bouton pour rouvrir le chatbot -->
    <button 
        id="open-chatbot-btn"
        onclick="toggleProjectChatbot()" 
        class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 flex items-center justify-center transition-transform hover:scale-110 z-40"
    >
        <i class="ti ti-robot text-2xl"></i>
    </button>
</div>

<style>
    .loading-dots {
        display: inline-flex;
        gap: 4px;
    }
    .loading-dots span {
        animation: dot-pulse 1.4s ease-in-out infinite;
        font-size: 20px;
        line-height: 1;
    }
    .loading-dots span:nth-child(1) {
        animation-delay: 0s;
    }
    .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
    }
    .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
    }
    @keyframes dot-pulse {
        0%, 60%, 100% {
            opacity: 0.3;
            transform: scale(1);
        }
        30% {
            opacity: 1;
            transform: scale(1.2);
        }
    }
    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }
    .animate-spin {
        animation: spin 1s linear infinite;
    }
</style>

<!-- Create Note Modal -->
<div id="create-note-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-2xl">
        <h2 class="text-xl font-bold mb-4">Créer une nouvelle note</h2>
        <form id="create-note-form" onsubmit="createNote(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Titre</label>
                <input type="text" name="title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Titre de la note">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Contenu</label>
                <textarea name="content" rows="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Contenu de la note..."></textarea>
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" onclick="hideCreateNoteModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Créer la note</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const projectId = window.location.pathname.split('/').pop();
    let projectChatHistory = [];
    let projectChatbotOpen = false;

    function showCreateNoteModal() {
        document.getElementById('create-note-modal').classList.remove('hidden');
    }

    function hideCreateNoteModal() {
        document.getElementById('create-note-modal').classList.add('hidden');
        document.getElementById('create-note-form').reset();
    }

    // Gérer l'ouverture/fermeture du chatbot
    function toggleProjectChatbot() {
        const chatbotArea = document.getElementById('project-chatbot-area');
        const notesContainer = document.getElementById('notes-list-container');
        const openBtn = document.getElementById('open-chatbot-btn');
        
        projectChatbotOpen = !projectChatbotOpen;
        
        if (projectChatbotOpen) {
            // Ouvrir le chatbot
            chatbotArea.classList.remove('hidden');
            notesContainer.classList.remove('w-full', 'border-r-0');
            notesContainer.classList.add('w-1/2', 'border-r');
            openBtn.classList.add('hidden');
        } else {
            // Fermer le chatbot
            chatbotArea.classList.add('hidden');
            notesContainer.classList.remove('w-1/2', 'border-r');
            notesContainer.classList.add('w-full', 'border-r-0');
            openBtn.classList.remove('hidden');
        }
    }

    // Charger les modèles pour le chatbot de projet
    async function loadProjectModels() {
        const response = await apiCall('/api/ollama/models');
        if (response && response.ok) {
            const models = await response.json();
            const select = document.getElementById('project-model-select');
            select.innerHTML = '';
            
            if (models.length > 0) {
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    select.appendChild(option);
                });
                select.value = models[0];
            } else {
                select.innerHTML = '<option value="">Aucun modèle disponible</option>';
            }
        }
    }

    async function loadProject() {
        const response = await apiCall(`/api/projects/${projectId}`);
        if (response && response.ok) {
            const project = await response.json();
            document.getElementById('project-title').textContent = project.title;
        }
    }

    // Stocker les statuts d'embedding pour le polling
    const embeddingStatuses = new Map();
    let embeddingStatusInterval = null;

    // Fonction pour obtenir l'icône de statut d'embedding
    function getEmbeddingStatusIcon(status) {
        if (!status) {
            // Par défaut, afficher "pending" si le statut n'est pas encore chargé
            return '<i class="ti ti-clock text-yellow-500" title="Vérification du statut..."></i>';
        }
        switch(status) {
            case 'processing':
                return '<i class="ti ti-loader-2 animate-spin text-blue-500" title="Génération des embeddings en cours..."></i>';
            case 'pending':
                return '<i class="ti ti-clock text-yellow-500" title="En attente de génération des embeddings"></i>';
            case 'completed':
                return '<i class="ti ti-check text-green-500" title="Embeddings générés"></i>';
            case 'none':
                // Si aucun chunk n'existe encore, afficher "pending"
                return '<i class="ti ti-clock text-yellow-500" title="Création des chunks en cours..."></i>';
            default:
                return '<i class="ti ti-clock text-yellow-500" title="Statut inconnu"></i>';
        }
    }

    // Vérifier le statut des embeddings pour une note
    async function checkEmbeddingStatus(noteId) {
        try {
            const response = await apiCall(`/api/notes/${noteId}/embedding-status`);
            if (response && response.ok) {
                const status = await response.json();
                const previousStatus = embeddingStatuses.get(noteId);
                
                // Mettre à jour le statut
                embeddingStatuses.set(noteId, status);
                
                // Mettre à jour l'icône seulement si le statut a changé
                if (!previousStatus || previousStatus.status !== status.status) {
                    updateNoteEmbeddingIcon(noteId, status.status);
                }
                
                return status;
            }
        } catch (error) {
            console.error(`Erreur lors de la vérification du statut pour la note ${noteId}:`, error);
        }
        return null;
    }

    // Mettre à jour l'icône d'embedding pour une note spécifique
    function updateNoteEmbeddingIcon(noteId, status) {
        const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);
        if (noteElement) {
            const iconContainer = noteElement.querySelector('.embedding-status-icon');
            if (iconContainer) {
                const newIcon = getEmbeddingStatusIcon(status);
                iconContainer.innerHTML = newIcon;
                console.log(`Icône mise à jour pour la note ${noteId}: ${status}`);
            } else {
                console.warn(`Container d'icône non trouvé pour la note ${noteId}`);
            }
        } else {
            console.warn(`Élément de note non trouvé pour la note ${noteId}`);
        }
    }

    // Vérifier le statut des embeddings pour toutes les notes
    async function checkAllEmbeddingStatuses() {
        const notes = await loadNotesData();
        if (notes && notes.length > 0) {
            // Vérifier le statut pour chaque note
            for (const note of notes) {
                await checkEmbeddingStatus(note.id);
            }
        }
    }

    // Charger les données des notes (sans affichage)
    async function loadNotesData() {
        const response = await apiCall(`/api/projects/${projectId}/notes`);
        if (response && response.ok) {
            return await response.json();
        }
        return null;
    }

    async function loadNotes() {
        const notes = await loadNotesData();
        if (notes) {
            const container = document.getElementById('notes-container');
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="ti ti-notes text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 mb-2">Aucune note</p>
                        <p class="text-sm text-gray-400">Créez votre première note pour commencer</p>
                    </div>
                `;
            } else {
                // Afficher d'abord les notes avec une icône par défaut (pending)
                container.innerHTML = notes.map(note => {
                    // Afficher "pending" par défaut pendant le chargement
                    const statusIcon = getEmbeddingStatusIcon('pending');
                    
                    return `
                    <div class="bg-white border border-gray-200 rounded-lg p-6 mb-4 hover:shadow-md transition" data-note-id="${note.id}">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <h3 class="text-lg font-semibold text-gray-900">${note.title}</h3>
                                <span class="embedding-status-icon">${statusIcon}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <a href="/notes/${note.id}/edit" class="text-gray-400 hover:text-gray-600">
                                    <i class="ti ti-pencil"></i>
                                </a>
                                <button onclick="deleteNote(${note.id})" class="text-gray-400 hover:text-red-600">
                                    <i class="ti ti-trash"></i>
                                </button>
                            </div>
                        </div>
                        <p class="text-gray-600 whitespace-pre-wrap">${note.content || 'Pas de contenu'}</p>
                        <p class="text-xs text-gray-400 mt-4">
                            <i class="ti ti-${note.note_type === 'written' ? 'pencil' : 'microphone'}"></i>
                            Note écrite • Modifiée le ${new Date(note.updated_at).toLocaleDateString('fr-FR')} à ${new Date(note.updated_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
                        </p>
                    </div>
                    `;
                }).join('');
                
                // Ensuite, vérifier les statuts d'embedding pour toutes les notes et mettre à jour les icônes
                const statusPromises = notes.map(note => checkEmbeddingStatus(note.id));
                await Promise.all(statusPromises);
            }
        }
    }

    async function createNote(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const data = {
            title: formData.get('title'),
            content: formData.get('content') || null,
            note_type: 'written'
        };
        const response = await apiCall(`/api/projects/${projectId}/notes`, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        if (response && response.ok) {
            hideCreateNoteModal();
            await loadNotes();
            // Redémarrer le polling après création d'une note
            stopEmbeddingStatusPolling();
            startEmbeddingStatusPolling();
        }
    }

    async function deleteNote(noteId) {
        if (!confirm('Êtes-vous sûr de vouloir supprimer cette note ?')) return;
        const response = await apiCall(`/api/notes/${noteId}`, {
            method: 'DELETE'
        });
        if (response && response.ok) {
            loadNotes();
        }
    }

    // Animation de chargement pour le chatbot de projet
    let projectLoadingAnimationInterval = null;
    
    function showProjectLoadingAnimation() {
        const messagesContainer = document.getElementById('project-chat-messages');
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'project-loading-message';
        loadingDiv.className = 'flex justify-start';
        loadingDiv.innerHTML = `
            <div class="bg-gray-100 text-gray-900 rounded-lg px-4 py-2">
                <span class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </span>
            </div>
        `;
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        const dots = loadingDiv.querySelectorAll('.loading-dots span');
        let dotIndex = 0;
        projectLoadingAnimationInterval = setInterval(() => {
            dots.forEach((dot, index) => {
                dot.style.opacity = index === dotIndex % 3 ? '1' : '0.3';
            });
            dotIndex++;
        }, 300);
    }
    
    function hideProjectLoadingAnimation() {
        const loadingDiv = document.getElementById('project-loading-message');
        if (loadingDiv) {
            loadingDiv.remove();
        }
        if (projectLoadingAnimationInterval) {
            clearInterval(projectLoadingAnimationInterval);
            projectLoadingAnimationInterval = null;
        }
    }

    // Envoyer un message au chatbot de projet avec streaming
    async function sendProjectChatMessage(event) {
        event.preventDefault();
        const input = document.getElementById('project-chat-input');
        const message = input.value.trim();
        const modelSelect = document.getElementById('project-model-select');
        const model = modelSelect.value;

        if (!message) return;
        if (!model) {
            alert('Veuillez sélectionner un modèle');
            return;
        }

        // Ajouter le message de l'utilisateur
        addMessageToProjectChat('user', message);
        input.value = '';
        
        // Désactiver le bouton et l'input pendant l'envoi
        const submitButton = event.target.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        input.disabled = true;

        // Afficher l'animation de chargement
        showProjectLoadingAnimation();

        // Préparer le contexte de conversation
        const context = projectChatHistory.map(msg => ({
            role: msg.role,
            content: msg.content
        }));

        // Créer un message assistant vide pour le streaming
        const messagesContainer = document.getElementById('project-chat-messages');
        const assistantMessageDiv = document.createElement('div');
        assistantMessageDiv.id = 'project-assistant-streaming-message';
        assistantMessageDiv.className = 'flex justify-start';
        assistantMessageDiv.innerHTML = `
            <div class="max-w-2xl bg-gray-100 text-gray-900 rounded-lg px-4 py-2">
                <p></p>
            </div>
        `;
        messagesContainer.appendChild(assistantMessageDiv);
        const assistantContent = assistantMessageDiv.querySelector('p');
        
        let fullResponse = '';

        // Envoyer au backend avec streaming
        try {
            const token = localStorage.getItem('authToken');
            const response = await fetch(`/api/projects/${projectId}/chat/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    message: message,
                    model: model,
                    context: context
                })
            });

            if (!response.ok) {
                throw new Error('Erreur lors de la requête');
            }

            // Lire le stream SSE
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim();
                        if (data) {
                            try {
                                const jsonData = JSON.parse(data);
                                if (jsonData.message && jsonData.message.content) {
                                    fullResponse += jsonData.message.content;
                                    assistantContent.textContent = fullResponse;
                                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                } else if (jsonData.done) {
                                    break;
                                } else if (jsonData.error) {
                                    throw new Error(jsonData.error);
                                }
                            } catch (e) {
                                console.warn('Erreur parsing JSON:', e, 'Data:', data);
                            }
                        }
                    }
                }
            }

            // Cacher l'animation et finaliser
            hideProjectLoadingAnimation();
            assistantMessageDiv.removeAttribute('id');
            projectChatHistory.push({ role: 'assistant', content: fullResponse });

        } catch (error) {
            hideProjectLoadingAnimation();
            if (document.getElementById('project-assistant-streaming-message')) {
                document.getElementById('project-assistant-streaming-message').remove();
            }
            addMessageToProjectChat('assistant', `Erreur: ${error.message}`);
        } finally {
            // Réactiver le bouton et l'input
            submitButton.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }

    // Ajouter un message au chat de projet
    function addMessageToProjectChat(role, content) {
        projectChatHistory.push({ role, content });
        const messagesContainer = document.getElementById('project-chat-messages');
        
        // Supprimer le message vide initial
        if (messagesContainer.querySelector('.text-center')) {
            messagesContainer.innerHTML = '';
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
        messageDiv.innerHTML = `
            <div class="max-w-2xl ${role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-900'} rounded-lg px-4 py-2">
                <p class="whitespace-pre-wrap">${content}</p>
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Démarrer le polling pour vérifier les statuts d'embedding
    function startEmbeddingStatusPolling() {
        // Arrêter le polling existant s'il y en a un
        if (embeddingStatusInterval) {
            clearInterval(embeddingStatusInterval);
        }
        
        console.log('Démarrage du polling des statuts d\'embedding');
        
        let consecutiveNoChanges = 0;
        const MAX_NO_CHANGES = 3; // Arrêter après 3 vérifications sans changement
        
        // Vérifier toutes les 3 secondes (moins fréquent pour réduire la charge)
        embeddingStatusInterval = setInterval(async () => {
            try {
                const notes = await loadNotesData();
                if (!notes || notes.length === 0) {
                    stopEmbeddingStatusPolling();
                    return;
                }
                
                let hasProcessingOrPending = false;
                let hasChanges = false;
                
                // Vérifier le statut pour chaque note
                for (const note of notes) {
                    const status = await checkEmbeddingStatus(note.id);
                    if (status) {
                        const previousStatus = embeddingStatuses.get(note.id);
                        // Détecter si le statut a changé
                        if (!previousStatus || previousStatus.status !== status.status) {
                            hasChanges = true;
                        }
                        
                        // Continuer le polling seulement si on a des notes en cours de traitement
                        if (status.status === 'processing' || status.status === 'pending') {
                            hasProcessingOrPending = true;
                        }
                    }
                }
                
                // Si aucun changement depuis plusieurs vérifications, arrêter le polling
                if (!hasChanges) {
                    consecutiveNoChanges++;
                } else {
                    consecutiveNoChanges = 0;
                }
                
                // Arrêter le polling si :
                // 1. Toutes les notes sont complètes ou "none" (pas besoin de continuer)
                // 2. Aucun changement depuis plusieurs vérifications
                if ((!hasProcessingOrPending && consecutiveNoChanges >= 1) || consecutiveNoChanges >= MAX_NO_CHANGES) {
                    console.log('Polling arrêté : aucun changement détecté ou toutes les notes sont stables');
                    stopEmbeddingStatusPolling();
                }
            } catch (error) {
                console.error('Erreur lors du polling des statuts:', error);
                consecutiveNoChanges++;
                if (consecutiveNoChanges >= MAX_NO_CHANGES) {
                    stopEmbeddingStatusPolling();
                }
            }
        }, 3000); // Vérifier toutes les 3 secondes (moins fréquent)
    }

    // Arrêter le polling
    function stopEmbeddingStatusPolling() {
        if (embeddingStatusInterval) {
            clearInterval(embeddingStatusInterval);
            embeddingStatusInterval = null;
        }
    }

    // Initialisation
    if (authToken) {
        loadProject();
        loadNotes().then(() => {
            // Démarrer le polling après le chargement initial
            startEmbeddingStatusPolling();
        });
        loadProjectModels();
    }
    
    // Nettoyer le polling quand on quitte la page
    window.addEventListener('beforeunload', () => {
        stopEmbeddingStatusPolling();
    });
</script>
{% endblock %}
