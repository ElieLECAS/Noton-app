{% extends "base.html" %}

{% block title %}Éditer la note - Noton{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-2 sm:gap-4 min-w-0 flex-1">
            <a id="back-link" href="javascript:history.back()" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex-shrink-0">
                <i class="ti ti-arrow-left text-xl"></i>
            </a>
            <h1 class="text-base sm:text-xl font-semibold text-gray-900 dark:text-gray-100 truncate">Éditer la note</h1>
        </div>
    </header>

    <!-- Edit Form -->
    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-gray-50 dark:bg-gray-900">
        <div class="max-w-4xl mx-auto">
            <form id="edit-note-form" onsubmit="updateNote(event)" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm p-4 sm:p-6 lg:p-8">
                <div class="mb-4 sm:mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 sm:mb-3">Titre</label>
                    <input 
                        type="text" 
                        id="note-title" 
                        required 
                        class="w-full px-4 py-2.5 sm:py-3 text-base sm:text-lg border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" 
                        placeholder="Titre de la note"
                    >
                </div>
                <div class="mb-4 sm:mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 sm:mb-3">Contenu</label>
                    <textarea 
                        id="note-content" 
                        rows="15" 
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-y font-sans leading-relaxed text-base" 
                        placeholder="Contenu de la note..."
                    ></textarea>
                </div>
                <div class="flex flex-col sm:flex-row justify-end gap-2 sm:gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
                    <a 
                        id="cancel-link"
                        href="javascript:history.back()" 
                        class="w-full sm:w-auto px-5 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-medium text-gray-700 dark:text-gray-300 text-center"
                    >
                        Annuler
                    </a>
                    <button 
                        type="submit" 
                        class="w-full sm:w-auto px-5 py-2.5 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 transition-colors font-medium shadow-sm hover:shadow-md"
                    >
                        Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const noteId = window.location.pathname.split('/')[2];

    let currentProjectId = null;

    async function loadNote() {
        const response = await apiCall(`/api/notes/${noteId}`);
        if (response && response.ok) {
            const note = await response.json();
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content || '';
            currentProjectId = note.project_id;
            // Mettre à jour les liens de retour
            const backLink = document.getElementById('back-link');
            const cancelLink = document.getElementById('cancel-link');
            if (currentProjectId) {
                if (backLink) backLink.href = `/projects/${currentProjectId}`;
                if (cancelLink) cancelLink.href = `/projects/${currentProjectId}`;
            }
        }
    }

    async function updateNote(event) {
        event.preventDefault();
        const data = {
            title: document.getElementById('note-title').value,
            content: document.getElementById('note-content').value || null
        };
        const response = await apiCall(`/api/notes/${noteId}`, {
            method: 'PUT',
            body: JSON.stringify(data)
        });
        if (response && response.ok) {
            const note = await response.json();
            // Rediriger vers la page du projet
            window.location.href = `/projects/${note.project_id}`;
        }
    }

    // Initialisation
    if (authToken) {
        loadNote();
    }
</script>
{% endblock %}
