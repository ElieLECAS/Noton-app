{% extends "base.html" %}

{% block title %}Éditer la note - Noton{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a id="back-link" href="javascript:history.back()" class="text-gray-600 hover:text-gray-900 p-2 rounded-lg hover:bg-gray-100 transition-colors">
                <i class="ti ti-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-semibold text-gray-900">Éditer la note</h1>
        </div>
    </header>

    <!-- Edit Form -->
    <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
        <div class="max-w-4xl mx-auto">
            <form id="edit-note-form" onsubmit="updateNote(event)" class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Titre</label>
                    <input 
                        type="text" 
                        id="note-title" 
                        required 
                        class="w-full px-4 py-3 text-lg border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" 
                        placeholder="Titre de la note"
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Contenu</label>
                    <textarea 
                        id="note-content" 
                        rows="20" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-y font-sans leading-relaxed" 
                        placeholder="Contenu de la note..."
                    ></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
                    <a 
                        id="cancel-link"
                        href="javascript:history.back()" 
                        class="px-5 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors font-medium text-gray-700"
                    >
                        Annuler
                    </a>
                    <button 
                        type="submit" 
                        class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-sm hover:shadow-md"
                    >
                        Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const noteId = window.location.pathname.split('/')[2];

    let currentProjectId = null;

    async function loadNote() {
        const response = await apiCall(`/api/notes/${noteId}`);
        if (response && response.ok) {
            const note = await response.json();
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content || '';
            currentProjectId = note.project_id;
            // Mettre à jour les liens de retour
            const backLink = document.getElementById('back-link');
            const cancelLink = document.getElementById('cancel-link');
            if (currentProjectId) {
                if (backLink) backLink.href = `/projects/${currentProjectId}`;
                if (cancelLink) cancelLink.href = `/projects/${currentProjectId}`;
            }
        }
    }

    async function updateNote(event) {
        event.preventDefault();
        const data = {
            title: document.getElementById('note-title').value,
            content: document.getElementById('note-content').value || null
        };
        const response = await apiCall(`/api/notes/${noteId}`, {
            method: 'PUT',
            body: JSON.stringify(data)
        });
        if (response && response.ok) {
            const note = await response.json();
            // Rediriger vers la page du projet
            window.location.href = `/projects/${note.project_id}`;
        }
    }

    // Initialisation
    if (authToken) {
        loadNote();
    }
</script>
{% endblock %}
