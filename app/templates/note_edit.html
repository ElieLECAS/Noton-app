{% extends "base.html" %}

{% block title %}Éditer la note - Noton{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="javascript:history.back()" class="text-gray-600 hover:text-gray-900">
                <i class="ti ti-arrow-left"></i>
            </a>
            <h1 class="text-xl font-semibold text-gray-900">Éditer la note</h1>
        </div>
    </header>

    <!-- Edit Form -->
    <div class="flex-1 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto">
            <form id="edit-note-form" onsubmit="updateNote(event)" class="bg-white border border-gray-200 rounded-lg p-6">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Titre</label>
                    <input type="text" id="note-title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Titre de la note">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contenu</label>
                    <textarea id="note-content" rows="15" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Contenu de la note..."></textarea>
                </div>
                <div class="flex justify-end gap-2">
                    <a href="javascript:history.back()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</a>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const noteId = window.location.pathname.split('/')[2];

    async function loadNote() {
        const response = await apiCall(`/api/notes/${noteId}`);
        if (response && response.ok) {
            const note = await response.json();
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content || '';
        }
    }

    async function updateNote(event) {
        event.preventDefault();
        const data = {
            title: document.getElementById('note-title').value,
            content: document.getElementById('note-content').value || null
        };
        const response = await apiCall(`/api/notes/${noteId}`, {
            method: 'PUT',
            body: JSON.stringify(data)
        });
        if (response && response.ok) {
            const note = await response.json();
            // Rediriger vers la page du projet
            window.location.href = `/projects/${note.project_id}`;
        }
    }

    // Initialisation
    if (authToken) {
        loadNote();
    }
</script>
{% endblock %}
