{% extends "base.html" %} {% block title %}Mes projets - Noton{% endblock %}

{% block extra_head %}
<!-- Marked.js pour le rendu Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- DOMPurify pour sécuriser le HTML généré -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<style>
    /* Styles pour le rendu Markdown dans les messages du chat */
    .markdown-content h1 { font-size: 1.5em; font-weight: bold; margin: 0.5em 0; }
    .markdown-content h2 { font-size: 1.3em; font-weight: bold; margin: 0.5em 0; }
    .markdown-content h3 { font-size: 1.1em; font-weight: bold; margin: 0.5em 0; }
    .markdown-content p { margin: 0.5em 0; }
    .markdown-content ul, .markdown-content ol { margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-content li { margin: 0.25em 0; }
    .markdown-content strong { font-weight: bold; }
    .markdown-content em { font-style: italic; }
    .markdown-content code { background-color: rgba(0,0,0,0.1); padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
    .dark .markdown-content code { background-color: rgba(255,255,255,0.1); }
    .markdown-content pre { background-color: rgba(0,0,0,0.1); padding: 0.5em; border-radius: 5px; overflow-x: auto; }
    .dark .markdown-content pre { background-color: rgba(255,255,255,0.1); }
    .markdown-content pre code { background-color: transparent; padding: 0; }
    .markdown-content blockquote { border-left: 3px solid rgba(0,0,0,0.2); padding-left: 1em; margin: 0.5em 0; font-style: italic; }
    .dark .markdown-content blockquote { border-left-color: rgba(255,255,255,0.2); }
</style>
{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- Header -->
    <header
        class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0"
    >
        <h1 class="text-lg sm:text-xl font-semibold text-gray-900 dark:text-gray-100">Mes projets</h1>
        <div class="flex items-center gap-2 sm:gap-4">
            <button
                onclick="toggleChatbot()"
                class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                title="Afficher/Masquer le chatbot"
            >
                <i id="chatbot-toggle-icon" class="ti ti-robot-off text-xl"></i>
            </button>
            <button
                onclick="showCreateProjectModal()"
                class="px-3 sm:px-4 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 flex items-center gap-2 text-sm sm:text-base"
            >
                <i class="ti ti-plus"></i>
                <span class="hidden sm:inline">Nouveau projet</span>
                <span class="sm:hidden">Nouveau</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden min-h-0">
        <!-- Projects List -->
        <div
            id="projects-list-container"
            class="w-full lg:w-1/3 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 border-b lg:border-b-0 p-4 sm:p-6 overflow-y-auto transition-all duration-300 ease-in-out"
        >
            <div id="projects-container">
                <!-- Projets chargés dynamiquement -->
            </div>
        </div>

        <!-- Chatbot Area -->
        <div
            id="chatbot-area"
            class="hidden fixed lg:relative inset-0 lg:inset-auto z-50 lg:z-auto flex flex-col bg-white dark:bg-gray-800 transition-all duration-300 ease-in-out min-h-0 overflow-hidden lg:w-2/3"
            style="transform: translateX(0)"
        >
            <div
                class="p-4 sm:p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between flex-shrink-0 bg-white dark:bg-gray-800"
            >
                <div>
                    <h2 class="text-base sm:text-lg font-semibold text-gray-900 dark:text-gray-100">Chatbot</h2>
                    <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mt-1">
                        Posez vos questions à l'assistant IA
                    </p>
                </div>
                <button
                    onclick="toggleChatbot()"
                    class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 p-2"
                    title="Fermer le chatbot"
                >
                    <i class="ti ti-robot-off text-xl"></i>
                </button>
            </div>

            <!-- Chat Messages -->
            <div
                id="chat-messages"
                class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 min-h-0 bg-white dark:bg-gray-800"
            >
                <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                    <i class="ti ti-message-circle text-3xl sm:text-4xl mb-2"></i>
                    <p class="text-sm sm:text-base">Commencez une conversation avec le chatbot</p>
                </div>
            </div>

            <style>
                .loading-dots {
                    display: inline-flex;
                    gap: 4px;
                }
                .loading-dots span {
                    animation: dot-pulse 1.4s ease-in-out infinite;
                    font-size: 20px;
                    line-height: 1;
                }
                .loading-dots span:nth-child(1) {
                    animation-delay: 0s;
                }
                .loading-dots span:nth-child(2) {
                    animation-delay: 0.2s;
                }
                .loading-dots span:nth-child(3) {
                    animation-delay: 0.4s;
                }
                @keyframes dot-pulse {
                    0%,
                    60%,
                    100% {
                        opacity: 0.3;
                        transform: scale(1);
                    }
                    30% {
                        opacity: 1;
                        transform: scale(1.2);
                    }
                }
                #chat-messages {
                    max-height: 100%;
                    height: 0;
                }
            </style>

            <!-- Chat Input -->
            <div class="p-4 sm:p-6 border-t border-gray-200 dark:border-gray-700 flex-shrink-0 bg-white dark:bg-gray-800">
                <form
                    id="chat-form"
                    onsubmit="sendChatMessage(event)"
                    class="flex flex-col gap-2"
                >
                    <div class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                        <div class="flex gap-2">
                            <select
                                id="provider-select"
                                class="flex-1 sm:flex-none px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-gray-900 dark:text-gray-100"
                                onchange="onProviderChange()"
                            >
                                <option value="ollama">Ollama</option>
                                <option value="openai">OpenAI</option>
                            </select>
                            <select
                                id="model-select"
                                class="flex-1 sm:flex-none px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-gray-900 dark:text-gray-100"
                            >
                                <option value="">Chargement...</option>
                            </select>
                        </div>
                        <div class="flex gap-2 flex-1">
                            <input
                                type="text"
                                id="chat-input"
                                placeholder="Tapez votre message..."
                                class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
                                autocomplete="off"
                                required
                            />
                            <button
                                type="submit"
                                class="px-4 sm:px-6 py-2 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 flex items-center gap-2 text-sm sm:text-base"
                            >
                                <i class="ti ti-send"></i>
                                <span class="hidden sm:inline">Envoyer</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %} {% block extra_scripts %}
<script>
    let chatHistory = [];
    let chatbotOpen = true; // Par défaut ouvert sur la page d'accueil

    // Gérer l'ouverture/fermeture du chatbot
    function toggleChatbot() {
        const chatbotArea = document.getElementById("chatbot-area");
        const projectsContainer = document.getElementById(
            "projects-list-container"
        );
        const toggleIcon = document.getElementById("chatbot-toggle-icon");

        chatbotOpen = !chatbotOpen;

        const isMobile = window.innerWidth < 1024;

        if (chatbotOpen) {
            // Ouvrir le chatbot
            chatbotArea.classList.remove("hidden");
            chatbotArea.style.transform = "translateX(0)";

            if (isMobile) {
                // Animation mobile depuis la droite
                chatbotArea.style.flex = "0 0 0%";
                chatbotArea.style.width = "0";
                chatbotArea.style.transform = "translateX(100%)";
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        chatbotArea.style.flex = "";
                        chatbotArea.style.width = "";
                        chatbotArea.style.transform = "translateX(0)";
                    });
                });
            }

            projectsContainer.classList.remove("w-full", "border-r-0");
            projectsContainer.classList.add("lg:w-1/3", "border-r");
            toggleIcon.classList.remove("ti-robot");
            toggleIcon.classList.add("ti-robot-off");
        } else {
            // Fermer le chatbot
            toggleIcon.classList.remove("ti-robot-off");
            toggleIcon.classList.add("ti-robot");

            if (isMobile) {
                // Animation mobile vers la droite
                requestAnimationFrame(() => {
                    chatbotArea.style.transform = "translateX(100%)";
                    projectsContainer.classList.remove("lg:w-1/3", "border-r");
                    projectsContainer.classList.add("w-full", "border-r-0");

                    setTimeout(() => {
                        chatbotArea.classList.add("hidden");
                        chatbotArea.style.transform = "translateX(0)";
                    }, 300);
                });
            } else {
                // Desktop : cacher complètement
                projectsContainer.classList.remove("lg:w-1/3", "border-r");
                projectsContainer.classList.add("w-full", "border-r-0");
                chatbotArea.classList.add("hidden");
            }
        }
    }

    // Initialiser l'état par défaut (chatbot ouvert)
    document.addEventListener("DOMContentLoaded", function () {
        const chatbotArea = document.getElementById("chatbot-area");
        const projectsContainer = document.getElementById(
            "projects-list-container"
        );
        const toggleIcon = document.getElementById("chatbot-toggle-icon");

        if (chatbotOpen) {
            chatbotArea.classList.remove("hidden");
            chatbotArea.style.transform = "translateX(0)";
            projectsContainer.classList.remove("w-full", "border-r-0");
            projectsContainer.classList.add("lg:w-1/3", "border-r");
            toggleIcon.classList.remove("ti-robot");
            toggleIcon.classList.add("ti-robot-off");
        } else {
            // Toujours cacher quand fermé
            chatbotArea.classList.add("hidden");
            projectsContainer.classList.remove("lg:w-1/3", "border-r");
            projectsContainer.classList.add("w-full", "border-r-0");
            toggleIcon.classList.remove("ti-robot-off");
            toggleIcon.classList.add("ti-robot");
        }
    });

    // Charger les modèles selon le provider sélectionné
    async function loadModels() {
        const providerSelect = document.getElementById("provider-select");
        const provider = providerSelect.value;
        const endpoint = provider === "openai" ? "/api/openai/models" : "/api/ollama/models";
        
        const response = await apiCall(endpoint);
        if (response && response.ok) {
            const models = await response.json();
            const select = document.getElementById("model-select");
            select.innerHTML = "";

            if (models.length > 0) {
                // Ajouter tous les modèles
                models.forEach((model) => {
                    const option = document.createElement("option");
                    option.value = model;
                    option.textContent = model;
                    select.appendChild(option);
                });
                // Sélectionner automatiquement le premier modèle
                select.value = models[0];
            } else {
                select.innerHTML =
                    '<option value="">Aucun modèle disponible</option>';
            }
        }
    }

    // Gérer le changement de provider
    function onProviderChange() {
        loadModels();
    }

    // Charger les projets
    async function loadProjectsList() {
        const response = await apiCall("/api/projects");
        if (response && response.ok) {
            const projects = await response.json();
            const container = document.getElementById("projects-container");

            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="ti ti-folder-off text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
                        <p class="text-gray-500 dark:text-gray-400 mb-2">Aucun projet</p>
                        <p class="text-sm text-gray-400 dark:text-gray-500">Créez votre premier projet pour commencer</p>
                    </div>
                `;
            } else {
                container.innerHTML = projects
                    .map(
                        (project) => `
                    <a href="/projects/${
                        project.id
                    }" class="block p-4 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-blue-500 dark:hover:border-blue-400 hover:shadow-md transition mb-3 active:bg-gray-50 dark:active:bg-gray-700 bg-white dark:bg-gray-800">
                        <h3 class="font-semibold text-gray-900 dark:text-gray-100 mb-1 text-base sm:text-lg">${
                            project.title
                        }</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2">${
                            project.description || "Aucune description"
                        }</p>
                        <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">Modifié le ${new Date(
                            project.updated_at
                        ).toLocaleDateString("fr-FR")}</p>
                    </a>
                `
                    )
                    .join("");
            }
        }
    }

    // Animation de chargement
    let loadingAnimationInterval = null;

    // Fonction utilitaire pour vérifier si l'utilisateur est proche du bas
    function isNearBottom(container, threshold = 100) {
        const scrollTop = container.scrollTop;
        const scrollHeight = container.scrollHeight;
        const clientHeight = container.clientHeight;
        return scrollHeight - scrollTop - clientHeight < threshold;
    }

    // Fonction utilitaire pour scroller vers le bas (seulement si l'utilisateur est déjà proche du bas)
    function scrollChatToBottom(force = false) {
        const messagesContainer = document.getElementById("chat-messages");
        if (messagesContainer) {
            // Utiliser requestAnimationFrame pour s'assurer que le DOM est mis à jour
            requestAnimationFrame(() => {
                // Si force est true ou si l'utilisateur est proche du bas, scroller
                if (force || isNearBottom(messagesContainer)) {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            });
        }
    }

    function showLoadingAnimation() {
        const messagesContainer = document.getElementById("chat-messages");
        const loadingDiv = document.createElement("div");
        loadingDiv.id = "loading-message";
        loadingDiv.className = "flex justify-start";
        loadingDiv.innerHTML = `
            <div class="bg-gray-100 text-gray-900 rounded-lg px-4 py-2">
                <span class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </span>
            </div>
        `;
        messagesContainer.appendChild(loadingDiv);
        scrollChatToBottom(true); // Forcer le scroll pour l'animation de chargement

        // Animation des points
        const dots = loadingDiv.querySelectorAll(".loading-dots span");
        let dotIndex = 0;
        loadingAnimationInterval = setInterval(() => {
            dots.forEach((dot, index) => {
                dot.style.opacity = index === dotIndex % 3 ? "1" : "0.3";
            });
            dotIndex++;
        }, 300);
    }

    function hideLoadingAnimation() {
        const loadingDiv = document.getElementById("loading-message");
        if (loadingDiv) {
            loadingDiv.remove();
        }
        if (loadingAnimationInterval) {
            clearInterval(loadingAnimationInterval);
            loadingAnimationInterval = null;
        }
    }

    // Envoyer un message au chatbot avec streaming
    async function sendChatMessage(event) {
        event.preventDefault();
        const input = document.getElementById("chat-input");
        const message = input.value.trim();
        const modelSelect = document.getElementById("model-select");
        const providerSelect = document.getElementById("provider-select");
        const model = modelSelect.value;
        const provider = providerSelect.value;

        if (!message) return;
        if (!model) {
            alert("Veuillez sélectionner un modèle");
            return;
        }

        // Ajouter le message de l'utilisateur
        addMessageToChat("user", message);
        input.value = "";

        // Désactiver le bouton et l'input pendant l'envoi
        const submitButton = event.target.querySelector(
            'button[type="submit"]'
        );
        submitButton.disabled = true;
        input.disabled = true;

        // Préparer le contexte
        const context = chatHistory.map((msg) => ({
            role: msg.role,
            content: msg.content,
        }));

        // Créer un message assistant vide pour le streaming (remplace l'animation de chargement)
        const messagesContainer = document.getElementById("chat-messages");
        // Supprimer le message vide initial s'il existe
        if (messagesContainer.querySelector(".text-center")) {
            messagesContainer.innerHTML = "";
        }

        const assistantMessageDiv = document.createElement("div");
        assistantMessageDiv.id = "assistant-streaming-message";
        assistantMessageDiv.className = "flex justify-start";
        assistantMessageDiv.innerHTML = `
            <div class="max-w-2xl bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg px-4 py-2">
                <div class="markdown-content text-gray-500 dark:text-gray-400 italic">En cours de génération...</div>
            </div>
        `;
        messagesContainer.appendChild(assistantMessageDiv);
        scrollChatToBottom(true); // Forcer le scroll au début du streaming
        const assistantContent = assistantMessageDiv.querySelector(".markdown-content");

        let fullResponse = "";
        let firstChunkReceived = false;

        // Envoyer au backend avec streaming
        try {
            const token = localStorage.getItem("authToken");
            const response = await fetch("/api/chat/stream", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({
                    message: message,
                    model: model,
                    provider: provider,
                    context: context,
                }),
            });

            if (!response.ok) {
                throw new Error("Erreur lors de la requête");
            }

            // Lire le stream SSE
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop() || ""; // Garder la dernière ligne incomplète dans le buffer

                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const data = line.slice(6).trim();
                        if (data) {
                            try {
                                const jsonData = JSON.parse(data);
                                // Ollama renvoie soit {"message": {"content": "..."}} soit {"done": true}
                                if (
                                    jsonData.message &&
                                    jsonData.message.content
                                ) {
                                    // Supprimer le texte de chargement au premier chunk
                                    if (!firstChunkReceived) {
                                        fullResponse = "";
                                        firstChunkReceived = true;
                                    }
                                    fullResponse += jsonData.message.content;
                                    // Rendre le Markdown en HTML de façon sécurisée
                                    const rawHtml = marked.parse(fullResponse);
                                    const cleanHtml = DOMPurify.sanitize(rawHtml);
                                    assistantContent.innerHTML = cleanHtml;
                                    scrollChatToBottom(false); // Ne pas forcer, seulement si proche du bas
                                } else if (jsonData.done) {
                                    // Fin du stream
                                    break;
                                } else if (jsonData.error) {
                                    throw new Error(jsonData.error);
                                }
                            } catch (e) {
                                // Ignorer les erreurs de parsing JSON pour les chunks partiels
                                console.warn(
                                    "Erreur parsing JSON:",
                                    e,
                                    "Data:",
                                    data
                                );
                            }
                        }
                    }
                }
            }

            // Finaliser le message
            assistantMessageDiv.removeAttribute("id");
            chatHistory.push({ role: "assistant", content: fullResponse });
            scrollChatToBottom(false); // Ne pas forcer à la fin, seulement si proche du bas
        } catch (error) {
            if (document.getElementById("assistant-streaming-message")) {
                document.getElementById("assistant-streaming-message").remove();
            }
            addMessageToChat("assistant", `Erreur: ${error.message}`);
        } finally {
            // Réactiver le bouton et l'input
            submitButton.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }

    // Ajouter un message au chat
    function addMessageToChat(role, content) {
        chatHistory.push({ role, content });
        const messagesContainer = document.getElementById("chat-messages");

        // Supprimer le message vide initial
        if (messagesContainer.querySelector(".text-center")) {
            messagesContainer.innerHTML = "";
        }

        const messageDiv = document.createElement("div");
        messageDiv.className = `flex ${
            role === "user" ? "justify-end" : "justify-start"
        }`;
        
        // Pour les messages assistant, rendre le Markdown
        let contentHtml;
        if (role === "assistant") {
            const rawHtml = marked.parse(content);
            const cleanHtml = DOMPurify.sanitize(rawHtml);
            contentHtml = `<div class="markdown-content">${cleanHtml}</div>`;
        } else {
            // Messages utilisateur en texte brut
            contentHtml = `<p class="whitespace-pre-wrap">${escapeHtml(content)}</p>`;
        }
        
        messageDiv.innerHTML = `
            <div class="max-w-2xl ${
                role === "user"
                    ? "bg-blue-600 dark:bg-blue-500 text-white"
                    : "bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100"
            } rounded-lg px-4 py-2">
                ${contentHtml}
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        scrollChatToBottom(true); // Forcer le scroll pour les nouveaux messages
    }
    
    // Fonction pour échapper le HTML
    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    // Initialisation
    if (authToken) {
        loadModels();
        loadProjectsList();
    }
</script>
{% endblock %}
